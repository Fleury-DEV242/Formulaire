<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulaire d'inscription</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container-app">
      <form novalidate>
        <h2 style="width: 200px; margin-bottom: 10px">Créer un compte</h2>

        <div id="input-name" style="margin-bottom: 20px">
          <label for="name">Nom</label>
          <input
            type="text"
            id="name"
            name="name"
            maxlength="10"
            placeholder="Ex : Mabika"
            autofocus
          />
        </div>

        <div id="input-firstname" style="margin-bottom: 20px">
          <label for="firstname">Prénom</label>
          <input
            type="text"
            id="firstname"
            name="firstname"
            maxlength="10"
            placeholder="Ex : Jean"
          />
        </div>

        <div id="input-email" style="margin-bottom: 20px">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example1234@gmail.com"
            maxlength="23"
          />
        </div>

        <div id="input-password" style="margin-bottom: 20px">
          <label for="password">Mot de passe <br> (au moins 8 caractères)</label>
          <input type="password" id="password" name="password" maxlength="20" />
        </div>

        <button type="submit">S'inscrire</button>
      </form>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
