<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulaire d'inscription</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container-app">
      <form action="" method="post">
        <h2 style="width: 200px; margin-bottom: 30px;">Créer un compte</h2>
        <div id="input-name" style="margin-bottom: 20px">
          <label for="name">Nom</label>
          <input type="text" id="name" name="name" maxlength="15" />
        </div>
        <div id="input-firstname" style="margin-bottom: 20px">
          <label for="firstname">Prénom</label>
          <input type="text" id="firstname" name="firstname" maxlength="10" />
        </div>
        <div id="input-password" style="margin-bottom: 20px">
          <label for="password">Mot de passe</label>
          <input type="text" id="password" name="password" maxlength="15" />
        </div>
        <button type="submit">Valider</button>
      </form>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
